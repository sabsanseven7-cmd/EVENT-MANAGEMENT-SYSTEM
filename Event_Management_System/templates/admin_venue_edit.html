<!DOCTYPE html>
<html lang="en">
<head>
    <title>Edit Venue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 min-h-screen transition-colors">
<nav class="bg-indigo-800 dark:bg-indigo-900 text-white p-4">
    <div class="container mx-auto flex justify-between items-center">
        <h1 class="text-xl font-bold">Edit Venue</h1>
        <div class="space-x-4 flex items-center">
            <a href="/admin/venues" class="hover:underline">Back to Venues</a>
            <a href="/admin_dashboard" class="hover:underline">Dashboard</a>
            <a href="/logout" class="hover:underline">Logout</a>
            <button type="button" onclick="toggleDark()" class="p-2 rounded bg-white/10 hover:bg-white/20" title="Toggle dark mode">Dark</button>
        </div>
    </div>
</nav>

<div class="container mx-auto p-6 max-w-lg">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="mb-4 p-3 rounded {% if category == 'error' %}bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-300{% elif category == 'success' %}bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-300{% else %}bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-6">
        <h2 class="text-xl font-semibold text-gray-800 dark:text-gray-100 mb-4">Edit {{ venue.name }}</h2>
        <form method="POST" class="space-y-3">
            <input name="name" value="{{ venue.name }}" placeholder="Venue name" required
                   class="w-full p-2 border dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-indigo-500">
            <input name="address" value="{{ venue.address }}" placeholder="Address" required
                   class="w-full p-2 border dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-indigo-500">
            <input name="capacity" type="number" value="{{ venue.capacity }}" placeholder="Capacity" min="1" required
                   class="w-full p-2 border dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-indigo-500">
            <div class="flex gap-2">
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg">Save</button>
                <a href="/admin/venues" class="bg-gray-200 dark:bg-gray-600 hover:bg-gray-300 dark:hover:bg-gray-500 text-gray-800 dark:text-gray-100 px-4 py-2 rounded-lg">Cancel</a>
            </div>
        </form>
    </div>
</div>
<script>
function toggleDark() {
    document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
}
if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches))
    document.documentElement.classList.add('dark');
else
    document.documentElement.classList.remove('dark');
</script>
</body>
</html>
