<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-6 bg-gray-100">

<h2 class="text-2xl font-bold mb-4">Admin Panel</h2>

<h3 class="font-semibold">Bookings</h3>
<table class="bg-white w-full mb-6">
<tr><th>Name</th><th>Event</th><th>Date</th><th>Guests</th></tr>
{% for b in bookings %}
<tr>
<td>{{b.name}}</td><td>{{b.event_type}}</td>
<td>{{b.date}}</td><td>{{b.guests}}</td>
</tr>
{% endfor %}
</table>

<h3 class="font-semibold">Chat Logs</h3>
<table class="bg-white w-full">
<tr><th>User</th><th>Bot</th></tr>
{% for c in chats %}
<tr>
<td>{{c.user_message}}</td>
<td>{{c.bot_reply}}</td>
</tr>
{% endfor %}
</table>

<a href="/logout" class="text-red-500 block mt-4">Logout</a>

</body>
</html>
