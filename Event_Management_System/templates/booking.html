<!DOCTYPE html>
<html>
<head>
<title>Booking</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<h2 class="text-2xl font-bold mb-4">Event Booking</h2>

<form method="POST" class="bg-white p-4 rounded shadow w-96">
    <input name="name" placeholder="Your Name" class="w-full mb-2 p-2 border">
    <select name="event" class="w-full mb-2 p-2 border">
        <option>Wedding</option>
        <option>Birthday</option>
        <option>Corporate</option>
    </select>
    <input type="date" name="date" class="w-full mb-2 p-2 border">
    <input name="guests" type="number" placeholder="Guests"
     class="w-full mb-2 p-2 border">
    <button class="bg-indigo-600 text-white p-2 w-full">Book</button>
</form>

<a href="/logout" class="text-red-500 block mt-4">Logout</a>

</body>
</html>
